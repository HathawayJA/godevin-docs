name: Devin on issue assignment
on:
  issues:
    types: [assigned]

# allow commenting on the issue
permissions:
  contents: read
  issues: write

concurrency:
  group: devin-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-devin-session:
    if: ${{ github.event.assignee.login == 'devin-ai-integration[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Build prompt file
        env:
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ASSIGNEE: ${{ github.event.assignee.login }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          jq -n -r \
            --arg url "$ISSUE_URL" \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --arg assignee "$ASSIGNEE" \
            --arg repo "$REPO" \
            --arg issue "$ISSUE_NUMBER" \
            '"Triage this issue and aggregate all relevant context:
          \($url)

          Title: \($title)
          Assigned to: \($assignee)

          Body:
          \($body)

          Follow the attached playbook to triage this issue, post a summary comment,
          and ask whether the assignee wants you to implement a fix or set up a TODO branch.

          REQUIREMENTS:
          - Perform root cause analysis: identify the relevant RST files, sections, and cross-references.
          - Search for related issues, PRs, and recent commits that may be connected.
          - Post your triage findings as a comment on the issue, including:
            * Root cause analysis with specific file and section references
            * Relevant RST files and line numbers
            * Proposed fix approach
          - End the comment by asking: Would you like me to implement this fix? Reply yes to proceed or no for a TODO branch.
          - Do NOT implement any code changes. Only triage and comment.
          - When you eventually open a PR (in a future session), include this exact line in the PR description:
            Fixes \($repo)#\($issue)
          - For every commit message in that PR, include:
            Refs \($repo)#\($issue)"' > prompt.txt

      - name: Add "devin" label to issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -fSs -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"labels":["devin"]}' \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/labels"

      - name: Create Devin session
        id: devin
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          PLAYBOOK_ID: ${{ secrets.DEVIN_TRIAGE_PLAYBOOK_ID }}
        run: |
          set -eo pipefail

          resp=$(curl -fSs https://api.devin.ai/v1/sessions \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --rawfile prompt prompt.txt \
                  --arg title "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
                  --arg repo "$REPO" \
                  --arg issue "$ISSUE_NUMBER" \
                  --arg playbook "$PLAYBOOK_ID" \
                  '{prompt:$prompt, title:$title, idempotent:true,
                    playbook_id:$playbook,
                    tags:["src:github","assigned","repo:"+$repo,"issue:"+$issue]}')" )

          echo "$resp" > resp.json

          # required outputs (fail if url missing)
          url=$(jq -er '.url' resp.json)
          echo "url=$url" >> "$GITHUB_OUTPUT"

          session_id=$(jq -r '.session_id' resp.json)
          echo "session_id=$session_id" >> "$GITHUB_OUTPUT"

          is_new=$(jq -r '.is_new_session // true' resp.json)
          echo "is_new_session=$is_new" >> "$GITHUB_OUTPUT"

      - name: Comment on the issue with session link
        if: ${{ steps.devin.outputs.url != '' && steps.devin.outputs.is_new_session == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_URL: ${{ steps.devin.outputs.url }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          jq -n \
            --arg url "$SESSION_URL" \
            '{body: "🤖 Devin is triaging this issue.\n\n**Session:** \($url)\n\nI will post a summary with a proposed fix shortly and ask if you would like me to implement it."}' > body.json

          curl -fSs -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @body.json \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments"
